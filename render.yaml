services:
  - type: web
    name: ai-health-assistant
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    # Note: Free tier on Render does not support persistent disks.
    # Uncomment the lines below if you deploy on a paid plan (e.g. starter) to persist RAG indices.
    # disk:
    #   name: chroma-storage
    #   mountPath: /app/backend/chroma_db
    #   sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
